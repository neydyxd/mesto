<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./pages/index.css">
  <title>Mesto</title>
  
</head>
<body class="page">
    <div class="container">
        <header class="header">
            <img class="header__logo" src="./images/logo.svg" alt="логотип место">
        </header>
        <main>
            <section class="profile">
                <img class="profile__avatar" src="./images/avatar.jpg" alt="аватар профиля">
                <div class="profile__info">
                    <div class="profile__flex">
                        <h1 class="profile__name">Жак-Ив Кусто</h1>
                        <button type="button" class="profile__edit-button"></button>
                    </div>
                    <p class="profile__about">Исследователь океана</p>   
                </div>
                <button type="button" class="profile__add-button">
                </button>
            </section>
            <section class="poster">
    
            </section>
        </main>
        <footer class="footer">
            <p class="footer__copyright">&copy; 2022 Mesto Russia</p>
        </footer>
        <div class="popup">
            <div class="popup__container">
                <button class="popup__close" type="button"> <img class="popup__close-image" src="./images/close.png" alt="кнопка закрытия формы"></button>
                <form name="profile-form" class="popup__form">
                    <h2 class="popup__title">Редактировать профиль</h2>
                    <input class="popup__input" name="form-name" placeholder="Имя" type="text" id="0">
                    <input class="popup__input" name="form-about" placeholder="О себе" type="text" id="1">
                    <button class="popup__save" type="submit">Сохранить</button>
                </form>
            </div>
        </div>
        <div class="popup popup-add">
            <div class="popup__container">
                <button class="popup__close popup__close-add" type="button"> <img class="popup__close-image" src="./images/close.png" alt="кнопка закрытия формы"></button>
                <form name="profile-form" class="popup__form">
                    <h2 class="popup__title">Новое место</h2>
                    <input class="popup__input" name="poster-name" placeholder="Название" type="text" id="2">
                    <input class="popup__input" name="poster-link" placeholder="Ссылка на картинку" type="text" id="3">
                    <button class="popup__save" type="submit">Создать</button>
                </form>
            </div>
        </div>
        <div class="popup-photo ">
                <div class="popup-photo__container">
                    <button class="popup-photo__close" type="button"> <img class="popup-photo__close-image" src="./images/close.png" alt="кнопка закрытия формы"></button> 
                    <img class="popup-photo__image" src="" alt="картинка постера"></img>
                    <p class="popup-photo__subtitle"></p>
                </div>
        </div>
    </div>
    <template class="poster-template">
        <div class="poster__item">
            <img class="poster__delete-button" src="./images/delete.svg" alt="кнопка удаления ">
            <button type="button" class="poster__photo-button"><img class="poster__photo" src="" alt="ваша картинка"></button>
            <div class="poster__info">
                <h2 class="poster__title"></h2>
                <button type="button" class="poster__like-button"></button>
            </div>
        </div>
    </template>
    <script src="./scripts/main.js"></script>
</body>
</html>
